<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>银河友人 - Star Drifter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); image-rendering: auto; }
#loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #aad; font-family: monospace; font-size: 18px; }
</style>
</head>
<body>
<div id="loading">Loading...</div>
<canvas id="gameCanvas"></canvas>
<script>
'use strict';

// ============================================================
// [1] CONFIG & CONSTANTS
// ============================================================
const W = 1280, H = 720;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

const INVENTORY_H = 80;
const INVENTORY_SLOT = 70;
const DIALOG_H = 120;

// ============================================================
// [2] UTILITY FUNCTIONS
// ============================================================
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function rand(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(rand(a, b + 1)); }
function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
function pointInRect(px, py, x, y, w, h) { return px >= x && px <= x + w && py >= y && py <= y + h; }
function pointInCircle(px, py, cx, cy, r) { return dist(px, py, cx, cy) <= r; }

const ease = {
  linear: t => t,
  inOut: t => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t,
  out: t => t * (2 - t),
  inBack: t => t * t * (2.7 * t - 1.7),
  outBack: t => { const s = 1.7; return --t * t * ((s + 1) * t + s) + 1; },
  bounce: t => { if (t < 1/2.75) return 7.5625*t*t; if (t < 2/2.75) return 7.5625*(t-=1.5/2.75)*t+.75; if (t < 2.5/2.75) return 7.5625*(t-=2.25/2.75)*t+.9375; return 7.5625*(t-=2.625/2.75)*t+.984375; }
};

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function rgbToStr(r,g,b,a=1) { return `rgba(${r|0},${g|0},${b|0},${a})`; }

// ============================================================
// [3] CORE ENGINE
// ============================================================

// --- Input Manager ---
const input = {
  mx: 0, my: 0,
  clicked: false, clickX: 0, clickY: 0,
  hoveredHotspot: null,
  selectedItem: null,
};

function canvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (W / rect.width),
    y: (e.clientY - rect.top) * (H / rect.height)
  };
}

canvas.addEventListener('mousemove', e => {
  const c = canvasCoords(e);
  input.mx = c.x; input.my = c.y;
});

canvas.addEventListener('click', e => {
  const c = canvasCoords(e);
  input.clicked = true;
  input.clickX = c.x; input.clickY = c.y;
});

// --- Audio Manager ---
const audio = {
  ctx: null,
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  },
  play(type) {
    if (!this.ctx) return;
    const ac = this.ctx;
    const now = ac.currentTime;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);

    switch(type) {
      case 'click':
        osc.frequency.value = 600;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
        break;
      case 'pickup':
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
        break;
      case 'success':
        osc.frequency.setValueAtTime(523, now);
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
        const osc2 = ac.createOscillator();
        const g2 = ac.createGain();
        osc2.connect(g2); g2.connect(ac.destination);
        osc2.frequency.value = 659; osc2.type = 'sine';
        g2.gain.setValueAtTime(0.2, now + 0.15);
        g2.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        osc2.start(now + 0.15); osc2.stop(now + 0.6);
        const osc3 = ac.createOscillator();
        const g3 = ac.createGain();
        osc3.connect(g3); g3.connect(ac.destination);
        osc3.frequency.value = 784; osc3.type = 'sine';
        g3.gain.setValueAtTime(0.2, now + 0.3);
        g3.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
        osc3.start(now + 0.3); osc3.stop(now + 0.8);
        break;
      case 'error':
        osc.frequency.value = 200;
        osc.type = 'sawtooth';
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
        break;
      case 'whoosh':
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.4);
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now); osc.stop(now + 0.4);
        break;
      case 'chime':
        osc.frequency.value = 1200;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        osc.start(now); osc.stop(now + 0.6);
        break;
    }
  },
  playAmbient() {
    if (!this.ctx || this._ambient) return;
    this._ambient = true;
    const ac = this.ctx;
    const bufSize = ac.sampleRate * 2;
    const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = ac.createBufferSource();
    noise.buffer = buf; noise.loop = true;
    const filter = ac.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 200;
    const gain = ac.createGain();
    gain.gain.value = 0.03;
    noise.connect(filter); filter.connect(gain); gain.connect(ac.destination);
    noise.start();
  }
};

// --- Tween System ---
const tweens = [];
function tween(obj, props, duration, easeFn = ease.inOut, onDone = null) {
  const start = {};
  for (const k in props) start[k] = obj[k];
  tweens.push({ obj, start, end: props, duration, elapsed: 0, ease: easeFn, onDone });
}
function updateTweens(dt) {
  for (let i = tweens.length - 1; i >= 0; i--) {
    const tw = tweens[i];
    tw.elapsed += dt;
    const t = clamp(tw.elapsed / tw.duration, 0, 1);
    const et = tw.ease(t);
    for (const k in tw.end) tw.obj[k] = lerp(tw.start[k], tw.end[k], et);
    if (t >= 1) {
      if (tw.onDone) tw.onDone();
      tweens.splice(i, 1);
    }
  }
}

// --- Particle System ---
const particles = [];
function spawnParticle(x, y, opts = {}) {
  particles.push({
    x, y,
    vx: opts.vx || rand(-0.3, 0.3),
    vy: opts.vy || rand(-0.5, -0.1),
    life: opts.life || rand(2, 5),
    maxLife: opts.life || rand(2, 5),
    size: opts.size || rand(1, 3),
    color: opts.color || '#fff',
    alpha: opts.alpha || 0.6,
    type: opts.type || 'circle'
  });
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * 60 * dt;
    p.y += p.vy * 60 * dt;
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
  }
}
function drawParticles() {
  for (const p of particles) {
    const a = p.alpha * (p.life / p.maxLife);
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    if (p.type === 'circle') {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'star') {
      drawStar(p.x, p.y, p.size, p.size * 0.4, 4);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawStar(cx, cy, outerR, innerR, points) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const a = (i * Math.PI) / points - Math.PI / 2;
    const r = i % 2 === 0 ? outerR : innerR;
    if (i === 0) ctx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
    else ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
  }
  ctx.closePath();
}

// --- Transition Manager ---
const transition = {
  active: false,
  alpha: 0,
  phase: 'none', // 'out', 'in'
  callback: null,

  start(cb) {
    this.active = true;
    this.phase = 'out';
    this.alpha = 0;
    this.callback = cb;
    tween(this, { alpha: 1 }, 0.5, ease.inOut, () => {
      if (this.callback) this.callback();
      this.phase = 'in';
      tween(this, { alpha: 0 }, 0.5, ease.inOut, () => {
        this.active = false;
        this.phase = 'none';
      });
    });
  },

  draw() {
    if (!this.active && this.alpha <= 0) return;
    ctx.fillStyle = rgbToStr(0, 0, 0, this.alpha);
    ctx.fillRect(0, 0, W, H);
  }
};

// ============================================================
// [4] DRAWING HELPERS (Procedural Art)
// ============================================================

function drawGradientRect(x, y, w, h, c1, c2, vertical = true) {
  const g = vertical ? ctx.createLinearGradient(x, y, x, y + h) : ctx.createLinearGradient(x, y, x + w, y);
  g.addColorStop(0, c1); g.addColorStop(1, c2);
  ctx.fillStyle = g;
  ctx.fillRect(x, y, w, h);
}

function drawRadialGlow(x, y, r, color, alpha = 0.3) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, rgbToStr(...Object.values(hexToRgb(color)), alpha));
  g.addColorStop(1, rgbToStr(...Object.values(hexToRgb(color)), 0));
  ctx.fillStyle = g;
  ctx.fillRect(x - r, y - r, r * 2, r * 2);
}

function drawStarField(time, count = 100) {
  const seed = 12345;
  let s = seed;
  function prng() { s = (s * 16807 + 0) % 2147483647; return s / 2147483647; }
  for (let i = 0; i < count; i++) {
    const x = prng() * W;
    const y = prng() * (H - INVENTORY_H - 100);
    const size = prng() * 2 + 0.5;
    const twinkle = Math.sin(time * 2 + prng() * 100) * 0.3 + 0.7;
    ctx.globalAlpha = twinkle * (0.4 + prng() * 0.6);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawNebula(x, y, w, h, color1, color2, time) {
  ctx.save();
  ctx.globalAlpha = 0.15;
  for (let i = 0; i < 5; i++) {
    const cx = x + w * (0.2 + 0.15 * i) + Math.sin(time * 0.3 + i) * 20;
    const cy = y + h * (0.3 + 0.1 * i) + Math.cos(time * 0.2 + i * 2) * 15;
    const r = 80 + i * 30;
    drawRadialGlow(cx, cy, r, i % 2 === 0 ? color1 : color2, 0.15);
  }
  ctx.restore();
}

function drawMountain(baseY, color, height, segments = 8) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, H);
  const segW = W / segments;
  for (let i = 0; i <= segments; i++) {
    const x = i * segW;
    const yOff = Math.sin(i * 1.5 + 0.5) * height * 0.3 + Math.sin(i * 3.2) * height * 0.15;
    ctx.lineTo(x, baseY - height + yOff);
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fill();
}

function drawGlowingOrb(x, y, r, color, time) {
  const pulse = 1 + Math.sin(time * 3) * 0.1;
  drawRadialGlow(x, y, r * 3 * pulse, color, 0.15);
  drawRadialGlow(x, y, r * 1.5 * pulse, color, 0.3);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, r * pulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = rgbToStr(255, 255, 255, 0.6);
  ctx.beginPath();
  ctx.arc(x - r * 0.3, y - r * 0.3, r * 0.25, 0, Math.PI * 2);
  ctx.fill();
}

function drawTree(x, y, h, trunkW, color, time) {
  ctx.fillStyle = '#3a2518';
  ctx.fillRect(x - trunkW/2, y - h * 0.4, trunkW, h * 0.4);

  const layers = 4;
  for (let i = 0; i < layers; i++) {
    const ly = y - h * 0.3 - i * h * 0.18;
    const lw = (h * 0.4 - i * h * 0.07);
    const sway = Math.sin(time * 0.8 + i * 0.5) * 3;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(x + sway, ly, lw, h * 0.15, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawAlienPlant(x, y, h, color, time) {
  const sway = Math.sin(time * 1.2 + x * 0.01) * 5;
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.quadraticCurveTo(x + sway, y - h * 0.5, x + sway * 2, y - h);
  ctx.stroke();

  drawGlowingOrb(x + sway * 2, y - h, 6, color, time);
}

function drawCrystal(x, y, h, w, color, time) {
  const glow = 0.5 + Math.sin(time * 2) * 0.2;
  ctx.save();
  ctx.globalAlpha = glow;
  drawRadialGlow(x, y - h/2, h, color, 0.2);
  ctx.globalAlpha = 1;

  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y - h);
  ctx.lineTo(x + w/2, y - h * 0.2);
  ctx.lineTo(x + w/3, y);
  ctx.lineTo(x - w/3, y);
  ctx.lineTo(x - w/2, y - h * 0.2);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = rgbToStr(255, 255, 255, 0.3);
  ctx.beginPath();
  ctx.moveTo(x, y - h);
  ctx.lineTo(x - w/2, y - h * 0.2);
  ctx.lineTo(x - w/5, y - h * 0.5);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawShip(x, y, scale, damaged, time) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  if (damaged) {
    ctx.translate(Math.sin(time * 0.5) * 2, 0);
    ctx.rotate(Math.sin(time * 0.3) * 0.03);
  }

  ctx.fillStyle = '#8899aa';
  ctx.beginPath();
  ctx.ellipse(0, 0, 60, 25, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#667788';
  ctx.beginPath();
  ctx.ellipse(0, -5, 60, 22, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#aabbcc';
  ctx.beginPath();
  ctx.ellipse(0, -15, 30, 20, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#88ccee';
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.ellipse(0, -18, 22, 13, 0, Math.PI, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  if (damaged) {
    ctx.strokeStyle = '#554';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-20, -10); ctx.lineTo(-15, 5); ctx.lineTo(-25, 15);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(30, -5); ctx.lineTo(35, 8); ctx.lineTo(28, 18);
    ctx.stroke();

    if (Math.sin(time * 5) > 0.3) {
      ctx.fillStyle = '#ff6633';
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.arc(40, 10, 8 + Math.sin(time * 8) * 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  ctx.restore();
}

function drawAstronaut(x, y, scale, time) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  const bob = Math.sin(time * 2) * 2;

  ctx.fillStyle = '#eee';
  ctx.beginPath();
  ctx.ellipse(0, bob - 15, 12, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#88ccee';
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.arc(0, bob - 17, 8, Math.PI * 0.8, Math.PI * 0.2, true);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#ddd';
  ctx.beginPath();
  ctx.ellipse(0, bob + 8, 10, 16, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#ccc';
  ctx.fillRect(-14, bob + 2, 6, 14);
  ctx.fillRect(8, bob + 2, 6, 14);

  ctx.fillStyle = '#bbb';
  ctx.fillRect(-8, bob + 18, 6, 10);
  ctx.fillRect(2, bob + 18, 6, 10);

  ctx.fillStyle = '#777';
  ctx.fillRect(-8, bob + 26, 7, 4);
  ctx.fillRect(2, bob + 26, 7, 4);

  ctx.fillStyle = '#ff6633';
  ctx.beginPath();
  ctx.arc(6, bob + 5, 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawRune(x, y, size, symbol, color, time) {
  const glow = 0.3 + Math.sin(time * 2 + symbol) * 0.2;
  ctx.save();
  ctx.globalAlpha = glow;
  drawRadialGlow(x, y, size * 2, color, 0.3);
  ctx.globalAlpha = 1;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';

  const shapes = [
    () => { ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2); ctx.moveTo(x, y-size); ctx.lineTo(x, y+size); ctx.moveTo(x-size, y); ctx.lineTo(x+size, y); ctx.stroke(); },
    () => { ctx.beginPath(); ctx.moveTo(x, y-size); ctx.lineTo(x+size, y+size); ctx.lineTo(x-size, y+size); ctx.closePath(); ctx.stroke(); },
    () => { ctx.beginPath(); ctx.rect(x-size*0.7, y-size*0.7, size*1.4, size*1.4); ctx.moveTo(x-size*0.7, y-size*0.7); ctx.lineTo(x+size*0.7, y+size*0.7); ctx.stroke(); },
    () => { drawStar(x, y, size, size*0.4, 5); ctx.stroke(); },
    () => { ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(x, y, size*0.5, 0, Math.PI*2); ctx.stroke(); },
    () => { ctx.beginPath(); ctx.moveTo(x, y-size); ctx.lineTo(x+size, y); ctx.lineTo(x, y+size); ctx.lineTo(x-size, y); ctx.closePath(); ctx.stroke(); }
  ];

  shapes[symbol % shapes.length]();
  ctx.restore();
}

// ============================================================
// [5] GAME SYSTEMS
// ============================================================

// --- Inventory ---
const inventory = {
  items: [],
  maxSlots: 6,

  add(item) {
    if (this.items.length < this.maxSlots && !this.has(item.id)) {
      this.items.push(item);
      audio.play('pickup');
      dialog.show(item.pickupText || `获得了 ${item.name}`, 2);
      return true;
    }
    return false;
  },

  remove(id) {
    const idx = this.items.findIndex(i => i.id === id);
    if (idx >= 0) { this.items.splice(idx, 1); return true; }
    return false;
  },

  has(id) { return this.items.some(i => i.id === id); },
  get(id) { return this.items.find(i => i.id === id); },

  draw(time) {
    const barY = H - INVENTORY_H;
    ctx.fillStyle = rgbToStr(10, 10, 30, 0.85);
    ctx.fillRect(0, barY, W, INVENTORY_H);
    ctx.strokeStyle = rgbToStr(100, 120, 180, 0.5);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, barY); ctx.lineTo(W, barY);
    ctx.stroke();

    const startX = (W - this.maxSlots * INVENTORY_SLOT) / 2;
    for (let i = 0; i < this.maxSlots; i++) {
      const sx = startX + i * INVENTORY_SLOT;
      const sy = barY + 5;
      const sw = INVENTORY_SLOT - 10;

      const isHovered = pointInRect(input.mx, input.my, sx, sy, sw, sw);
      ctx.strokeStyle = isHovered ? '#88aaff' : rgbToStr(60, 70, 100, 0.6);
      ctx.lineWidth = isHovered ? 2 : 1;
      ctx.strokeRect(sx, sy, sw, sw);

      if (this.items[i]) {
        const item = this.items[i];
        const isSelected = input.selectedItem === item.id;
        if (isSelected) {
          ctx.fillStyle = rgbToStr(60, 80, 140, 0.4);
          ctx.fillRect(sx, sy, sw, sw);
        }
        this.drawItem(item, sx + sw/2, sy + sw/2, 0.8, time);
      }
    }

    if (input.selectedItem) {
      const item = this.get(input.selectedItem);
      if (item) {
        ctx.globalAlpha = 0.6;
        this.drawItem(item, input.mx, input.my - 30, 0.6, time);
        ctx.globalAlpha = 1;
      }
    }
  },

  drawItem(item, x, y, scale, time) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    switch(item.id) {
      case 'antenna':
        ctx.strokeStyle = '#aaa'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(0, 15); ctx.lineTo(0, -15); ctx.stroke();
        ctx.strokeStyle = '#ff6'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(-5, -15); ctx.lineTo(5, -15); ctx.stroke();
        if (item.repaired) {
          drawGlowingOrb(0, -18, 4, '#4f4', time);
        } else {
          ctx.strokeStyle = '#666';
          ctx.beginPath(); ctx.moveTo(-3, -5); ctx.lineTo(3, 0); ctx.stroke();
        }
        break;
      case 'gear':
        ctx.strokeStyle = '#cd7f32'; ctx.lineWidth = 2; ctx.fillStyle = '#8B4513';
        ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.stroke();
        for (let i = 0; i < 6; i++) {
          const a = i * Math.PI/3 + time * 0.5;
          ctx.fillRect(Math.cos(a)*10-3, Math.sin(a)*10-3, 6, 6);
        }
        ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fill();
        break;
      case 'energy_cell':
        ctx.fillStyle = '#2a5'; ctx.fillRect(-10, -15, 20, 30);
        ctx.fillStyle = '#4f8'; ctx.fillRect(-7, -12, 14, 24);
        const charge = 0.5 + Math.sin(time * 3) * 0.3;
        ctx.fillStyle = '#8ff'; ctx.fillRect(-7, -12 + 24 * (1-charge), 14, 24 * charge);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
        ctx.strokeRect(-10, -15, 20, 30);
        break;
      case 'nav_chip':
        ctx.fillStyle = '#234'; ctx.fillRect(-12, -8, 24, 16);
        ctx.fillStyle = '#456'; ctx.fillRect(-10, -6, 20, 12);
        ctx.fillStyle = '#0af';
        for (let i = 0; i < 3; i++) {
          for (let j = 0; j < 4; j++) {
            if ((i + j) % 2 === 0) ctx.fillRect(-8+j*5, -4+i*4, 3, 2);
          }
        }
        if (Math.sin(time * 4) > 0) {
          ctx.fillStyle = '#0f0';
          ctx.fillRect(6, -4, 2, 2);
        }
        break;
      case 'crystal':
        drawCrystal(0, 15, 25, 16, '#a0f0ff', time);
        break;
      case 'fruit':
        ctx.fillStyle = '#ff69b4';
        ctx.beginPath(); ctx.ellipse(0, 0, 12, 10, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#90ee90';
        ctx.beginPath(); ctx.ellipse(-2, -10, 5, 3, -0.3, 0, Math.PI*2); ctx.fill();
        const sparkle = Math.sin(time * 3) * 0.3 + 0.7;
        ctx.globalAlpha = sparkle;
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(4, -3, 2, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
        break;
    }
    ctx.restore();
  },

  handleClick(x, y) {
    const barY = H - INVENTORY_H;
    if (y < barY) {
      if (input.selectedItem) {
        return true;
      }
      return false;
    }

    const startX = (W - this.maxSlots * INVENTORY_SLOT) / 2;
    for (let i = 0; i < this.maxSlots; i++) {
      const sx = startX + i * INVENTORY_SLOT;
      const sy = barY + 5;
      const sw = INVENTORY_SLOT - 10;
      if (pointInRect(x, y, sx, sy, sw, sw) && this.items[i]) {
        if (input.selectedItem === this.items[i].id) {
          input.selectedItem = null;
        } else {
          input.selectedItem = this.items[i].id;
          audio.play('click');
        }
        return true;
      }
    }
    input.selectedItem = null;
    return true;
  }
};

// --- Dialog System ---
const dialog = {
  text: '',
  timer: 0,
  alpha: 0,
  queue: [],

  show(text, duration = 3) {
    this.text = text;
    this.timer = duration;
    this.alpha = 1;
  },

  update(dt) {
    if (this.timer > 0) {
      this.timer -= dt;
      if (this.timer <= 0.5) {
        this.alpha = this.timer / 0.5;
      }
      if (this.timer <= 0) {
        this.text = '';
        this.alpha = 0;
      }
    }
  },

  draw() {
    if (this.alpha <= 0 || !this.text) return;
    ctx.save();
    ctx.globalAlpha = this.alpha;

    const padding = 20;
    ctx.font = '18px serif';
    const metrics = ctx.measureText(this.text);
    const tw = metrics.width + padding * 2;
    const th = 40;
    const tx = (W - tw) / 2;
    const ty = H - INVENTORY_H - th - 20;

    ctx.fillStyle = rgbToStr(5, 5, 25, 0.9);
    ctx.beginPath();
    const r = 10;
    ctx.moveTo(tx + r, ty);
    ctx.lineTo(tx + tw - r, ty);
    ctx.quadraticCurveTo(tx + tw, ty, tx + tw, ty + r);
    ctx.lineTo(tx + tw, ty + th - r);
    ctx.quadraticCurveTo(tx + tw, ty + th, tx + tw - r, ty + th);
    ctx.lineTo(tx + r, ty + th);
    ctx.quadraticCurveTo(tx, ty + th, tx, ty + th - r);
    ctx.lineTo(tx, ty + r);
    ctx.quadraticCurveTo(tx, ty, tx + r, ty);
    ctx.fill();

    ctx.strokeStyle = rgbToStr(100, 130, 200, 0.5);
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.fillStyle = '#ccd8ff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.text, W / 2, ty + th / 2);

    ctx.restore();
  }
};

const gameState = {
  currentScene: 'title',
  puzzles: {
    crashSite: { exploredShip: false, foundAntenna: false },
    forest: { foundFruit: false, fedCreature: false, gotCrystal: false, foundGear: false },
    ruins: { symbols: [0, 0, 0, 0], targetSymbols: [2, 0, 3, 1], doorOpen: false, gotCell: false },
    cave: { mirrors: [0, 0, 0], solved: false, gotChip: false },
    ship: { antennaFixed: false, gearInstalled: false, cellInstalled: false, chipInstalled: false, launched: false }
  },
  visited: {},
  ending: false,
  endingTimer: 0,
};

function saveGame() {
  try {
    localStorage.setItem('starDrifter', JSON.stringify({
      scene: gameState.currentScene,
      puzzles: gameState.puzzles,
      items: inventory.items.map(i => ({ id: i.id, repaired: i.repaired })),
      visited: gameState.visited,
    }));
  } catch(e) {}
}

function loadGame() {
  try {
    const data = JSON.parse(localStorage.getItem('starDrifter'));
    if (!data) return false;
    gameState.currentScene = data.scene;
    gameState.puzzles = data.puzzles;
    gameState.visited = data.visited || {};
    inventory.items = [];
    for (const saved of data.items) {
      const def = itemDefs[saved.id];
      if (def) {
        const item = { ...def };
        if (saved.repaired) item.repaired = true;
        inventory.items.push(item);
      }
    }
    return true;
  } catch(e) { return false; }
}

    drawStarField(time, 200);
    drawNebula(0, 0, W, H, '#6644aa', '#2266aa', time);

      drawAlienPlant(100 + i * 160, H * 0.85, 40 + i * 10, ['#44ffaa', '#ff88cc', '#88aaff'][i%3], time);
    }

    drawParticles();

    ctx.globalAlpha = this.titleAlpha || 0;
    ctx.font = 'bold 64px serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#cce0ff';
    ctx.shadowColor = '#4488ff';
    ctx.shadowBlur = 30;
    ctx.fillText('银河友人', W/2, H * 0.3);
    ctx.shadowBlur = 0;

    ctx.globalAlpha = this.subtitleAlpha || 0;
    ctx.font = '20px serif';
    ctx.fillStyle = '#8899bb';
    ctx.fillText('Star Drifter — 一个点击冒险的小故事', W/2, H * 0.38);

    ctx.globalAlpha = this.btnAlpha || 0;

    const btnY = H * 0.55;
    const btnW = 200, btnH = 50;
    const startHovered = pointInRect(input.mx, input.my, W/2-btnW/2, btnY, btnW, btnH);
    ctx.fillStyle = startHovered ? rgbToStr(40, 60, 120, 0.8) : rgbToStr(20, 30, 60, 0.6);
    ctx.strokeStyle = startHovered ? '#88aaff' : '#445588';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(W/2-btnW/2, btnY, btnW, btnH, 8);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#cce';
    ctx.font = '22px serif';
    ctx.fillText('开始冒险', W/2, btnY + btnH/2 + 2);

    if (this.hasSave) {
      const btn2Y = btnY + 70;
      const contHovered = pointInRect(input.mx, input.my, W/2-btnW/2, btn2Y, btnW, btnH);
      ctx.fillStyle = contHovered ? rgbToStr(40, 60, 120, 0.8) : rgbToStr(20, 30, 60, 0.6);
      ctx.strokeStyle = contHovered ? '#88aaff' : '#445588';
      ctx.beginPath();
      ctx.roundRect(W/2-btnW/2, btn2Y, btnW, btnH, 8);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#cce';
      ctx.fillText('继续游戏', W/2, btn2Y + btnH/2 + 2);
    }

    ctx.restore();
  },

  handleClick(x, y) {
    const btnY = H * 0.55;
    const btnW = 200, btnH = 50;
    if (pointInRect(x, y, W/2-btnW/2, btnY, btnW, btnH)) {
      audio.init();
      audio.play('whoosh');
      localStorage.removeItem('starDrifter');
      gameState.puzzles = {
        crashSite: { exploredShip: false, foundAntenna: false },
        forest: { foundFruit: false, fedCreature: false, gotCrystal: false, foundGear: false },
        ruins: { symbols: [0, 0, 0, 0], targetSymbols: [2, 0, 3, 1], doorOpen: false, gotCell: false },
        cave: { mirrors: [0, 0, 0], solved: false, gotChip: false },
        ship: { antennaFixed: false, gearInstalled: false, cellInstalled: false, chipInstalled: false, launched: false }
      };
      inventory.items = [];
      input.selectedItem = null;
      switchScene('crashSite');
      return;
    }
    if (this.hasSave) {
      const btn2Y = btnY + 70;
      if (pointInRect(x, y, W/2-btnW/2, btn2Y, btnW, btnH)) {
        audio.init();
        audio.play('whoosh');
        loadGame();
        switchScene(gameState.currentScene);
        return;
      }
    }
  }
};

// --- SCENE: CRASH SITE ---
scenes.crashSite = {
  ambientSpawned: 0,

  init() {
    if (!gameState.visited.crashSite) {
      gameState.visited.crashSite = true;
      setTimeout(() => dialog.show('飞船坠毁了……得想办法修好它。先四处看看吧。', 4), 500);
    }
  },

  update(dt, time) {
    if (time - this.ambientSpawned > 0.5) {
      this.ambientSpawned = time;
      spawnParticle(rand(0, W), rand(50, 200), {
        color: '#aaccff', size: rand(0.5, 2), life: rand(3, 6),
        vy: rand(-0.1, 0.05), vx: rand(-0.05, 0.05)
      });
      if (Math.random() < 0.3) {
        spawnParticle(rand(W*0.55, W*0.75), rand(H*0.4, H*0.5), {
          color: '#ff6633', size: rand(1, 3), life: rand(0.5, 1.5),
          vy: rand(-0.8, -0.3), vx: rand(-0.2, 0.2)
        });
      }
    }
  },

  draw(time) {
    drawGradientRect(0, 0, W, H - INVENTORY_H, '#0a0520', '#1a1040');
    drawStarField(time, 150);
    drawNebula(W*0.5, 50, W*0.5, 300, '#553388', '#223366', time);

    const moonX = W * 0.85, moonY = 80;
    drawRadialGlow(moonX, moonY, 80, '#aabbff', 0.1);
    ctx.fillStyle = '#dde8ff';
    ctx.beginPath(); ctx.arc(moonX, moonY, 35, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#bbccee';
    ctx.beginPath(); ctx.arc(moonX - 8, moonY - 5, 8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(moonX + 10, moonY + 8, 5, 0, Math.PI*2); ctx.fill();

    drawMountain(H * 0.75, '#1a1035', 120, 10);
    drawMountain(H * 0.8, '#221545', 80, 8);

    ctx.fillStyle = '#2a1848';
    ctx.fillRect(0, H * 0.75, W, H * 0.25 - INVENTORY_H);
    ctx.fillStyle = '#331a55';
    ctx.fillRect(0, H * 0.75, W, 3);

    drawShip(W * 0.65, H * 0.6, 1.5, true, time);

    drawAstronaut(W * 0.35, H * 0.58, 1.2, time);

    for (let i = 0; i < 5; i++) {
      drawAlienPlant(50 + i * 80, H * 0.75, 30 + Math.sin(i) * 15, '#44ddaa', time);
    }
    for (let i = 0; i < 3; i++) {
      drawAlienPlant(W - 50 - i * 60, H * 0.75, 25 + i * 10, '#dd88ff', time);
    }

    if (!gameState.puzzles.crashSite.foundAntenna) {
      ctx.save();
      ctx.translate(W * 0.45, H * 0.68);
      ctx.rotate(0.5);
      ctx.strokeStyle = '#999';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -25); ctx.stroke();
      ctx.strokeStyle = '#ff6';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-5, -25); ctx.lineTo(5, -25); ctx.stroke();
      const hoverAnt = pointInCircle(input.mx, input.my, W*0.45, H*0.66, 20);
      if (hoverAnt) {
        drawRadialGlow(W*0.45, H*0.66, 30, '#ffff00', 0.2);
      }
      ctx.restore();
    }

    const navRight = { x: W - 50, y: H * 0.5, r: 25 };
    const hrNav = pointInCircle(input.mx, input.my, navRight.x, navRight.y, navRight.r);
    ctx.save();
    ctx.globalAlpha = hrNav ? 0.9 : 0.4;
    ctx.fillStyle = '#446';
    ctx.beginPath(); ctx.arc(navRight.x, navRight.y, navRight.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#aac';
    ctx.font = '24px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('→', navRight.x, navRight.y);
    ctx.restore();

    drawParticles();
  },

  handleClick(x, y) {
    if (!gameState.puzzles.crashSite.foundAntenna && pointInCircle(x, y, W*0.45, H*0.66, 25)) {
      gameState.puzzles.crashSite.foundAntenna = true;
      inventory.add({ ...itemDefs.antenna });
      saveGame();
      return;
    }

    if (pointInCircle(x, y, W*0.65, H*0.6, 50)) {
      if (!gameState.puzzles.crashSite.exploredShip) {
        gameState.puzzles.crashSite.exploredShip = true;
        dialog.show('飞船损坏严重：天线断了，引擎缺齿轮，电力耗尽，导航系统离线。', 5);
      } else {
        const ps = gameState.puzzles.ship;
        const missing = [];
        if (!ps.antennaFixed) missing.push('天线');
        if (!ps.gearInstalled) missing.push('齿轮');
        if (!ps.cellInstalled) missing.push('能量电池');
        if (!ps.chipInstalled) missing.push('导航芯片');
        if (missing.length > 0) {
          dialog.show(`飞船还需要修理：${missing.join('、')}`, 3);
        } else {
          dialog.show('飞船已经修好了！可以起飞了！', 3);
        }
      }
      return;
    }

    if (pointInCircle(x, y, W*0.35, H*0.58, 30)) {
      dialog.show('我得收集零件来修好飞船，然后离开这里。', 3);
      return;
    }

    if (pointInCircle(x, y, W-50, H*0.5, 25)) {
      audio.play('whoosh');
      switchScene('forest');
      return;
    }

    if (input.selectedItem && pointInCircle(x, y, W*0.65, H*0.6, 60)) {
      const ps = gameState.puzzles.ship;
      const item = input.selectedItem;
      if (item === 'antenna' && !ps.antennaFixed) {
        const ant = inventory.get('antenna');
        if (ant && ant.repaired) {
          ps.antennaFixed = true;
          inventory.remove('antenna');
          input.selectedItem = null;
          audio.play('success');
          dialog.show('天线安装完成！通讯系统恢复正常。', 3);
          checkShipComplete();
          saveGame();
        } else {
          dialog.show('天线还是坏的，需要先修好它。', 2);
        }
        return;
      }
      if (item === 'gear' && !ps.gearInstalled) {
        ps.gearInstalled = true;
        inventory.remove('gear');
        input.selectedItem = null;
        audio.play('success');
        dialog.show('齿轮安装完成！引擎修复了。', 3);
        checkShipComplete();
        saveGame();
        return;
      }
      if (item === 'energy_cell' && !ps.cellInstalled) {
        ps.cellInstalled = true;
        inventory.remove('energy_cell');
        input.selectedItem = null;
        audio.play('success');
        dialog.show('能量电池装好了！飞船动力恢复。', 3);
        checkShipComplete();
        saveGame();
        return;
      }
      if (item === 'nav_chip' && !ps.chipInstalled) {
        ps.chipInstalled = true;
        inventory.remove('nav_chip');
        input.selectedItem = null;
        audio.play('success');
        dialog.show('导航芯片插入！星图系统上线。', 3);
        checkShipComplete();
        saveGame();
        return;
      }
    }
  }
};

function checkShipComplete() {
  const ps = gameState.puzzles.ship;
  if (ps.antennaFixed && ps.gearInstalled && ps.cellInstalled && ps.chipInstalled) {
    setTimeout(() => {
      dialog.show('所有部件修复完成！点击飞船起飞吧！', 4);
      ps.launched = false;
    }, 1500);
  }
}

      ctx.save();
      ctx.translate(gx, gy - 5);
      ctx.strokeStyle = '#cd7f32'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.stroke();
      ctx.restore();

      if (pointInCircle(input.mx, input.my, gx, gy, 25)) {
        drawRadialGlow(gx, gy, 35, '#ffff00', 0.2);
      }
    }

    // Creature
    const cx = W * 0.5, cy = this.creatureY;
    const fed = gameState.puzzles.forest.fedCreature;

    ctx.fillStyle = fed ? '#66dd88' : '#4488aa';
    ctx.beginPath();
    ctx.ellipse(cx, cy, 30, 25, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx - 10, cy - 8, 8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 10, cy - 8, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    const lookX = (input.mx - cx) * 0.02;
    const lookY = (input.my - cy) * 0.02;
    ctx.beginPath(); ctx.arc(cx - 10 + lookX, cy - 8 + lookY, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 10 + lookX, cy - 8 + lookY, 4, 0, Math.PI*2); ctx.fill();

    if (fed) {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx, cy + 5, 10, 0, Math.PI); ctx.stroke();

      if (!gameState.puzzles.forest.gotCrystal) {
        drawCrystal(cx, cy + 40, 20, 14, '#a0f0ff', time);
        if (pointInCircle(input.mx, input.my, cx, cy + 30, 20)) {
          drawRadialGlow(cx, cy + 30, 25, '#ffff00', 0.2);
        }
      }
    } else {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx, cy + 12, 8, Math.PI, 0); ctx.stroke();
    }

    if (pointInCircle(input.mx, input.my, cx, cy, 30) && !fed) {
      drawRadialGlow(cx, cy, 40, '#ffff00', 0.15);
    }

    // Nav arrows
    const navLeft = { x: 50, y: H * 0.5 };
    const navRight = { x: W - 50, y: H * 0.5 };
    for (const nav of [navLeft, navRight]) {
      const hr = pointInCircle(input.mx, input.my, nav.x, nav.y, 25);
      ctx.save();
      ctx.globalAlpha = hr ? 0.9 : 0.4;
      ctx.fillStyle = '#446';
      ctx.beginPath(); ctx.arc(nav.x, nav.y, 25, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#aac';
      ctx.font = '24px serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(nav === navLeft ? '←' : '→', nav.x, nav.y);
      ctx.restore();
    }

    drawParticles();
  },

  handleClick(x, y) {
    const ps = gameState.puzzles.forest;

    if (!ps.foundFruit && pointInCircle(x, y, W*0.25, H*0.52, 20)) {
      ps.foundFruit = true;
      inventory.add({ ...itemDefs.fruit });
      saveGame();
      return;
    }

    if (!ps.foundGear && pointInCircle(x, y, W*0.7, H*0.58, 25)) {
      ps.foundGear = true;
      inventory.add({ ...itemDefs.gear });
      saveGame();
      return;
    }

    const cx = W * 0.5, cy = this.creatureY;

    if (!ps.fedCreature && pointInCircle(x, y, cx, cy, 35)) {
      if (input.selectedItem === 'fruit') {
        ps.fedCreature = true;
        inventory.remove('fruit');
        input.selectedItem = null;
        audio.play('success');
        dialog.show('小生物开心地吃掉了果实，吐出了一颗水晶！', 4);
        saveGame();
        return;
      } else {
        dialog.show('这个小生物看起来很饿……也许该喂它点什么？', 3);
        return;
      }
    }

    if (ps.fedCreature && !ps.gotCrystal && pointInCircle(x, y, cx, cy + 30, 20)) {
      ps.gotCrystal = true;
      inventory.add({ ...itemDefs.crystal });
      saveGame();
      return;
    }

    if (pointInCircle(x, y, 50, H*0.5, 25)) {
      audio.play('whoosh');
      switchScene('crashSite');
      return;
    }
    if (pointInCircle(x, y, W-50, H*0.5, 25)) {
      audio.play('whoosh');
      switchScene('ruins');
      return;
    }

    if (input.selectedItem === 'crystal' && inventory.has('antenna')) {
      const ant = inventory.get('antenna');
      if (ant && !ant.repaired) {
        ant.repaired = true;
        inventory.remove('crystal');
        input.selectedItem = null;
        audio.play('success');
        dialog.show('用水晶修好了天线！天线现在能正常工作了。', 3);
        saveGame();
        return;
      }
    }
  }
};

// --- SCENE: ANCIENT RUINS ---
scenes.ruins = {
  ambientSpawned: 0,

  init() {
    if (!gameState.visited.ruins) {
      gameState.visited.ruins = true;
      setTimeout(() => dialog.show('古老的遗迹……石柱上有奇怪的符号。也许可以旋转它们。', 4), 500);
    }
  },

  update(dt, time) {
    if (time - this.ambientSpawned > 0.6) {
      this.ambientSpawned = time;
      spawnParticle(rand(W*0.3, W*0.7), rand(100, H*0.6), {
        color: '#ffcc44', size: rand(1, 2), life: rand(2, 4),
        vy: rand(-0.2, -0.05), vx: rand(-0.05, 0.05)
      });
    }
  },

  draw(time) {
    drawGradientRect(0, 0, W, H - INVENTORY_H, '#120818', '#1a1030');
    drawStarField(time, 60);

    drawMountain(H * 0.7, '#1a0a28', 100, 8);

    ctx.fillStyle = '#1a0a20';
    ctx.fillRect(0, H * 0.65, W, H * 0.35 - INVENTORY_H);

    // Pillars
    for (let i = 0; i < 5; i++) {
      const px = W * 0.15 + i * W * 0.17;
      const ph = 200 + Math.sin(i * 1.5) * 40;
      ctx.fillStyle = '#3a2a48';
      ctx.fillRect(px - 15, H * 0.65 - ph, 30, ph);
      ctx.fillStyle = '#4a3a58';
      ctx.fillRect(px - 20, H * 0.65 - ph, 40, 15);
      ctx.fillRect(px - 20, H * 0.65 - 10, 40, 10);
    }

    // Symbol puzzle
    const ps = gameState.puzzles.ruins;
    const symX = W * 0.5, symY = H * 0.4;
    const symSpacing = 80;

    ctx.fillStyle = '#2a1a38';
    ctx.beginPath();
    ctx.roundRect(symX - symSpacing * 2.2, symY - 50, symSpacing * 4.4, 100, 10);
    ctx.fill();
    ctx.strokeStyle = '#5a3a78';
    ctx.lineWidth = 2;
    ctx.stroke();

    for (let i = 0; i < 4; i++) {
      const sx = symX - symSpacing * 1.5 + i * symSpacing;
      const correct = ps.symbols[i] === ps.targetSymbols[i];
      const runeColor = correct ? '#44ff88' : '#ff8844';
      drawRune(sx, symY, 22, ps.symbols[i], runeColor, time);

      const hovered = pointInCircle(input.mx, input.my, sx, symY, 30);
      if (hovered && !ps.doorOpen) {
        drawRadialGlow(sx, symY, 35, '#ffff00', 0.15);
      }
    }

    if (!ps.doorOpen) {
      ctx.font = '14px serif';
      ctx.fillStyle = '#887';
      ctx.textAlign = 'center';
      ctx.fillText('点击符号旋转 (提示: ◇ ○ □ △)', symX, symY + 60);
    }

    // Door
    const doorX = W * 0.5, doorY = H * 0.6;
    ctx.fillStyle = ps.doorOpen ? '#1a0a20' : '#4a3a58';
    ctx.fillRect(doorX - 30, doorY - 60, 60, 60);
    ctx.strokeStyle = '#6a5a78';
    ctx.lineWidth = 2;
    ctx.strokeRect(doorX - 30, doorY - 60, 60, 60);

    if (ps.doorOpen) {
      drawRadialGlow(doorX, doorY - 30, 40, '#44ff88', 0.3);
      ctx.font = '14px serif';
      ctx.fillStyle = '#8f8';
      ctx.textAlign = 'center';
      ctx.fillText('已打开', doorX, doorY + 10);

      if (!ps.gotCell) {
        ctx.save();
        ctx.translate(doorX, doorY - 30);
        ctx.fillStyle = '#2a5';
        ctx.fillRect(-8, -12, 16, 24);
        ctx.fillStyle = '#4f8';
        ctx.fillRect(-6, -10, 12, 20);
        const charge = 0.5 + Math.sin(time * 3) * 0.3;
        ctx.fillStyle = '#8ff';
        ctx.fillRect(-6, -10 + 20 * (1-charge), 12, 20 * charge);
        ctx.restore();

        if (pointInCircle(input.mx, input.my, doorX, doorY - 30, 20)) {
          drawRadialGlow(doorX, doorY - 30, 30, '#ffff00', 0.2);
        }
      }
    }

    // Decorative runes on walls
    for (let i = 0; i < 6; i++) {
      const rx = 80 + i * 200;
      const ry = H * 0.55;
      drawRune(rx, ry, 12, i, '#5a3a78', time);
    }

    // Nav arrows
    const navLeft = { x: 50, y: H * 0.5 };
    const navRight = { x: W - 50, y: H * 0.5 };
    for (const nav of [navLeft, navRight]) {
      const hr = pointInCircle(input.mx, input.my, nav.x, nav.y, 25);
      ctx.save();
      ctx.globalAlpha = hr ? 0.9 : 0.4;
      ctx.fillStyle = '#446';
      ctx.beginPath(); ctx.arc(nav.x, nav.y, 25, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#aac';
      ctx.font = '24px serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(nav === navLeft ? '←' : '→', nav.x, nav.y);
      ctx.restore();
    }

    drawParticles();
  },

  handleClick(x, y) {
    const ps = gameState.puzzles.ruins;
    const symX = W * 0.5, symY = H * 0.4;
    const symSpacing = 80;

    if (!ps.doorOpen) {
      for (let i = 0; i < 4; i++) {
        const sx = symX - symSpacing * 1.5 + i * symSpacing;
        if (pointInCircle(x, y, sx, symY, 30)) {
          ps.symbols[i] = (ps.symbols[i] + 1) % 6;
          audio.play('click');

          let allCorrect = true;
          for (let j = 0; j < 4; j++) {
            if (ps.symbols[j] !== ps.targetSymbols[j]) { allCorrect = false; break; }
          }
          if (allCorrect) {
            ps.doorOpen = true;
            audio.play('success');
            dialog.show('符号排列正确！远古之门开启了！', 3);
            saveGame();
          }
          return;
        }
      }
    }

    const doorX = W * 0.5, doorY = H * 0.6;
    if (ps.doorOpen && !ps.gotCell && pointInCircle(x, y, doorX, doorY - 30, 25)) {
      ps.gotCell = true;
      inventory.add({ ...itemDefs.energy_cell });
      saveGame();
      return;
    }

    if (pointInCircle(x, y, 50, H*0.5, 25)) {
      audio.play('whoosh');
      switchScene('forest');
      return;
    }
    if (pointInCircle(x, y, W-50, H*0.5, 25)) {
      audio.play('whoosh');
      switchScene('cave');
      return;
    }
  }
};

// --- SCENE: CRYSTAL CAVE ---
scenes.cave = {
  ambientSpawned: 0,

  init() {
    if (!gameState.visited.cave) {
      gameState.visited.cave = true;
      setTimeout(() => dialog.show('好美的水晶洞穴……光线似乎可以被反射。点击水晶改变方向。', 5), 500);
    }
  },

  update(dt, time) {
    if (time - this.ambientSpawned > 0.3) {
      this.ambientSpawned = time;
      spawnParticle(rand(0, W), rand(50, H*0.7), {
        color: ['#a0f0ff', '#f0a0ff', '#a0fff0'][randInt(0,2)],
        size: rand(1, 3), life: rand(2, 5),
        vy: rand(-0.2, 0.1), vx: rand(-0.15, 0.15),
        type: Math.random() > 0.5 ? 'star' : 'circle'
      });
    }
  },

  draw(time) {
    drawGradientRect(0, 0, W, H - INVENTORY_H, '#0a0518', '#150a28');

    // Cave walls
    ctx.fillStyle = '#1a0a28';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(W * 0.1, 0);
    for (let i = 0; i < 8; i++) {
      ctx.lineTo(W * 0.05 + Math.sin(i * 1.5) * 30, i * H / 8);
    }
    ctx.lineTo(0, H);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(W, 0);
    ctx.lineTo(W * 0.9, 0);
    for (let i = 0; i < 8; i++) {
      ctx.lineTo(W * 0.95 - Math.sin(i * 1.2 + 1) * 30, i * H / 8);
    }
    ctx.lineTo(W, H);
    ctx.fill();

    // Ceiling stalactites
    for (let i = 0; i < 10; i++) {
      const sx = W * 0.1 + i * W * 0.08;
      const sh = 30 + Math.sin(i * 2) * 20;
      ctx.fillStyle = '#2a1a38';
      ctx.beginPath();
      ctx.moveTo(sx - 8, 0);
      ctx.lineTo(sx, sh);
      ctx.lineTo(sx + 8, 0);
      ctx.fill();
    }

    // Floor
    ctx.fillStyle = '#1a0a25';
    ctx.fillRect(0, H * 0.7, W, H * 0.3 - INVENTORY_H);

    // Crystal decorations
    for (let i = 0; i < 8; i++) {
      const cx = W * 0.1 + i * W * 0.1 + 40;
      const isFloor = i % 2 === 0;
      const cy = isFloor ? H * 0.7 : 0;
      const ch = 30 + i * 8;
      if (isFloor) {
        drawCrystal(cx, cy, ch, 12 + i * 2, ['#a0f0ff', '#f0a0ff', '#a0fff0', '#ffa0f0'][i%4], time);
      }
    }

    // Mirror puzzle
    const ps = gameState.puzzles.cave;
    const mirrorPositions = [
      { x: W * 0.3, y: H * 0.35 },
      { x: W * 0.5, y: H * 0.45 },
      { x: W * 0.7, y: H * 0.35 },
    ];

    // Light source
    const lightX = W * 0.12, lightY = H * 0.35;
    drawGlowingOrb(lightX, lightY, 10, '#ffff44', time);

    // Draw light beam path
    ctx.save();
    ctx.strokeStyle = '#ffff4488';
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 4]);
    ctx.shadowColor = '#ffff44';
    ctx.shadowBlur = 10;

    const angles = [0, Math.PI/6, -Math.PI/6, Math.PI/4, -Math.PI/4, Math.PI/3];
    let beamX = lightX + 15, beamY = lightY;
    let beamAngle = 0;

    ctx.beginPath();
    ctx.moveTo(beamX, beamY);

    let hitTarget = true;
    for (let i = 0; i < 3; i++) {
      const mp = mirrorPositions[i];
      const ma = angles[ps.mirrors[i]];

      ctx.lineTo(mp.x, mp.y);
      beamX = mp.x; beamY = mp.y;

      if (i < 2) {
        const nextTarget = mirrorPositions[i + 1];
        const dx = nextTarget.x - mp.x;
        const dy = nextTarget.y - mp.y;
        const targetAngle = Math.atan2(dy, dx);
        const reflectedAngle = ma;
      }
    }

    const targetX = W * 0.88, targetY = H * 0.4;
    if (ps.mirrors[0] === 2 && ps.mirrors[1] === 4 && ps.mirrors[2] === 1) {
      ctx.lineTo(targetX, targetY);
      hitTarget = true;
    } else {
      const lastM = mirrorPositions[2];
      const endAngle = angles[ps.mirrors[2]];
      ctx.lineTo(lastM.x + Math.cos(endAngle) * 200, lastM.y + Math.sin(endAngle) * 200);
      hitTarget = false;
    }
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Draw mirrors
    for (let i = 0; i < 3; i++) {
      const mp = mirrorPositions[i];
      const ma = angles[ps.mirrors[i]];
      const hovered = pointInCircle(input.mx, input.my, mp.x, mp.y, 25);

      ctx.save();
      ctx.translate(mp.x, mp.y);
      ctx.rotate(ma);

      ctx.fillStyle = hovered ? '#88aaff' : '#6688cc';
      ctx.fillRect(-20, -3, 40, 6);
      ctx.strokeStyle = '#aaccff';
      ctx.lineWidth = 1;
      ctx.strokeRect(-20, -3, 40, 6);

      ctx.restore();

      if (hovered) {
        drawRadialGlow(mp.x, mp.y, 30, '#ffff00', 0.15);
      }

      ctx.font = '12px serif';
      ctx.fillStyle = '#667';
      ctx.textAlign = 'center';
      ctx.fillText(`[${i+1}]`, mp.x, mp.y + 25);
    }

    // Target receptor
    ctx.fillStyle = ps.solved ? '#44ff88' : '#443344';
    ctx.beginPath();
    ctx.arc(targetX, targetY, 15, 0, Math.PI * 2);
    ctx.fill();
    if (ps.solved) {
      drawRadialGlow(targetX, targetY, 40, '#44ff88', 0.3);
    }
    ctx.strokeStyle = '#665577';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(targetX, targetY, 15, 0, Math.PI * 2);
    ctx.stroke();

    if (ps.solved && !ps.gotChip) {
      const chipX = targetX, chipY = targetY + 40;
      ctx.fillStyle = '#234';
      ctx.fillRect(chipX - 12, chipY - 8, 24, 16);
      ctx.fillStyle = '#0af';
      for (let i = 0; i < 3; i++) {
        ctx.fillRect(chipX - 8 + i * 7, chipY - 4, 4, 2);
        ctx.fillRect(chipX - 8 + i * 7, chipY + 1, 4, 2);
      }
      if (pointInCircle(input.mx, input.my, chipX, chipY, 20)) {
        drawRadialGlow(chipX, chipY, 25, '#ffff00', 0.2);
      }
    }

    ctx.font = '14px serif';
    ctx.fillStyle = '#887';
    ctx.textAlign = 'center';
    if (!ps.solved) {
      ctx.fillText('点击镜子旋转，将光线反射到右边的接收器', W * 0.5, H * 0.62);
    }

    // Nav
    const navLeft = { x: 50, y: H * 0.5 };
    const hrNav = pointInCircle(input.mx, input.my, navLeft.x, navLeft.y, 25);
    ctx.save();
    ctx.globalAlpha = hrNav ? 0.9 : 0.4;
    ctx.fillStyle = '#446';
    ctx.beginPath(); ctx.arc(navLeft.x, navLeft.y, 25, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#aac';
    ctx.font = '24px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('←', navLeft.x, navLeft.y);
    ctx.restore();

    drawParticles();
  },

  handleClick(x, y) {
    const ps = gameState.puzzles.cave;

    const mirrorPositions = [
      { x: W * 0.3, y: H * 0.35 },
      { x: W * 0.5, y: H * 0.45 },
      { x: W * 0.7, y: H * 0.35 },
    ];

    if (!ps.solved) {
      for (let i = 0; i < 3; i++) {
        const mp = mirrorPositions[i];
        if (pointInCircle(x, y, mp.x, mp.y, 25)) {
          ps.mirrors[i] = (ps.mirrors[i] + 1) % 6;
          audio.play('click');

          if (ps.mirrors[0] === 2 && ps.mirrors[1] === 4 && ps.mirrors[2] === 1) {
            ps.solved = true;
            audio.play('success');
            dialog.show('光线成功聚焦！接收器启动了，出现了一个芯片！', 4);
            saveGame();
          }
          return;
        }
      }
    }

    const targetX = W * 0.88, targetY = H * 0.4;
    if (ps.solved && !ps.gotChip && pointInCircle(x, y, targetX, targetY + 40, 25)) {
      ps.gotChip = true;
      inventory.add({ ...itemDefs.nav_chip });
      saveGame();
      return;
    }

    if (pointInCircle(x, y, 50, H*0.5, 25)) {
      audio.play('whoosh');
      switchScene('ruins');
      return;
    }
  }
};

// --- ENDING SCENE ---
scenes.ending = {
  timer: 0,
  phase: 0,
  shipY: 0,
  starSpeed: 1,

  init() {
    this.timer = 0;
    this.phase = 0;
    this.shipY = H * 0.5;
    this.starSpeed = 1;
  },

  update(dt, time) {
    this.timer += dt;

    if (this.timer > 2 && this.phase === 0) {
      this.phase = 1;
      dialog.show('引擎启动……', 2);
    }
    if (this.timer > 5 && this.phase === 1) {
      this.phase = 2;
      dialog.show('升空！', 2);
      tween(this, { shipY: -100 }, 4, ease.inBack);
      tween(this, { starSpeed: 20 }, 3, ease.inOut);
    }
    if (this.timer > 10 && this.phase === 2) {
      this.phase = 3;
    }
    if (this.timer > 14 && this.phase === 3) {
      this.phase = 4;
    }

    for (let i = 0; i < this.starSpeed; i++) {
      if (Math.random() < 0.3) {
        spawnParticle(rand(0, W), H + 10, {
          color: '#fff', size: rand(1, 2 + this.starSpeed * 0.2),
          life: 2, vy: -this.starSpeed * 0.5, vx: 0
        });
      }
    }
  },

  draw(time) {
    drawGradientRect(0, 0, W, H, '#020210', '#050520');

    if (this.phase < 3) {
      drawStarField(time * this.starSpeed, 200);
    }

    drawParticles();

    if (this.phase < 3) {
      drawShip(W * 0.5, this.shipY, 2, false, time);

      if (this.phase >= 1) {
        for (let i = 0; i < 5; i++) {
          spawnParticle(W * 0.5 + rand(-20, 20), this.shipY + 30, {
            color: ['#ff6633', '#ffaa33', '#ffcc66'][randInt(0,2)],
            size: rand(2, 5), life: rand(0.3, 0.8),
            vy: rand(0.5, 2), vx: rand(-0.3, 0.3)
          });
        }
      }
    }

    if (this.phase >= 3) {
      ctx.save();
      const a = clamp((this.timer - 10) / 2, 0, 1);
      ctx.globalAlpha = a;
      ctx.font = 'bold 48px serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#cce0ff';
      ctx.shadowColor = '#4488ff';
      ctx.shadowBlur = 20;
      ctx.fillText('银河友人', W/2, H * 0.35);
      ctx.shadowBlur = 0;

      ctx.font = '22px serif';
      ctx.fillStyle = '#8899bb';
      ctx.fillText('感谢游玩', W/2, H * 0.45);

      ctx.font = '16px serif';
      ctx.fillStyle = '#667788';
      ctx.fillText('小宇航员成功回到了星际航路上', W/2, H * 0.55);
      ctx.fillText('在这颗神秘星球上的冒险，将成为永恒的回忆。', W/2, H * 0.6);
      ctx.restore();
    }

    if (this.phase >= 4) {
      ctx.save();
      const a = clamp((this.timer - 14) / 2, 0, 1);
      ctx.globalAlpha = a;
      const btnY = H * 0.72;
      const btnW = 200, btnH = 50;
      const hovered = pointInRect(input.mx, input.my, W/2-btnW/2, btnY, btnW, btnH);
      ctx.fillStyle = hovered ? rgbToStr(40, 60, 120, 0.8) : rgbToStr(20, 30, 60, 0.6);
      ctx.strokeStyle = hovered ? '#88aaff' : '#445588';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(W/2-btnW/2, btnY, btnW, btnH, 8);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#cce';
      ctx.font = '22px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('返回标题', W/2, btnY + btnH/2);
      ctx.restore();
    }
  },

  handleClick(x, y) {
    if (this.phase >= 4) {
      const btnY = H * 0.72;
      const btnW = 200, btnH = 50;
      if (pointInRect(x, y, W/2-btnW/2, btnY, btnW, btnH)) {
        localStorage.removeItem('starDrifter');
        audio.play('whoosh');
        switchScene('title');
      }
    }
  }
};

// ============================================================
// [7] SCENE MANAGER & GAME LOOP
// ============================================================

let currentScene = null;
let gameTime = 0;
let lastTime = 0;

function switchScene(name) {
  transition.start(() => {
    gameState.currentScene = name;
    currentScene = scenes[name];
    particles.length = 0;
    if (currentScene.init) currentScene.init();
    if (name !== 'title' && name !== 'ending') saveGame();
  });
}

function handleGlobalClick(x, y) {
  audio.init();
  audio.playAmbient();

  if (transition.active) return;

  if (gameState.currentScene !== 'title' && gameState.currentScene !== 'ending') {
    if (inventory.handleClick(x, y)) return;
  }

  // Check if using item on ship in crash site for repair
  if (gameState.currentScene === 'crashSite' && input.selectedItem) {
    const ps = gameState.puzzles.ship;
    if (ps.antennaFixed && ps.gearInstalled && ps.cellInstalled && ps.chipInstalled) {
      if (pointInCircle(x, y, W*0.65, H*0.6, 60) && !ps.launched) {
        ps.launched = true;
        audio.play('success');
        dialog.show('飞船启动！准备升空！', 3);
        setTimeout(() => switchScene('ending'), 2000);
        return;
      }
    }
  }

  // Check for fully repaired ship launch
  if (gameState.currentScene === 'crashSite') {
    const ps = gameState.puzzles.ship;
    if (ps.antennaFixed && ps.gearInstalled && ps.cellInstalled && ps.chipInstalled && !ps.launched) {
      if (pointInCircle(x, y, W*0.65, H*0.6, 60)) {
        ps.launched = true;
        audio.play('success');
        dialog.show('飞船启动！准备升空！', 3);
        setTimeout(() => switchScene('ending'), 2000);
        saveGame();
        return;
      }
    }
  }

  if (currentScene && currentScene.handleClick) {
    currentScene.handleClick(x, y);
  }
}

function updateCursor() {
  if (input.selectedItem) {
    canvas.style.cursor = 'grab';
    return;
  }

  if (currentScene === scenes.title || currentScene === scenes.ending) {
    canvas.style.cursor = 'default';
    return;
  }

  canvas.style.cursor = 'default';
}

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  gameTime += dt;

  // Update
  updateTweens(dt);
  updateParticles(dt);
  dialog.update(dt);
  if (currentScene && currentScene.update) currentScene.update(dt, gameTime);
  updateCursor();

  // Draw
  ctx.clearRect(0, 0, W, H);

  if (currentScene && currentScene.draw) currentScene.draw(gameTime);

  if (gameState.currentScene !== 'title' && gameState.currentScene !== 'ending') {
    inventory.draw(gameTime);
  }

  dialog.draw();
  transition.draw();

  // Handle click
  if (input.clicked) {
    handleGlobalClick(input.clickX, input.clickY);
    input.clicked = false;
  }

  requestAnimationFrame(gameLoop);
}

// --- Resize handler ---
function resize() {
  const aspect = W / H;
  let cw = window.innerWidth;
  let ch = window.innerHeight;
  if (cw / ch > aspect) {
    cw = ch * aspect;
  } else {
    ch = cw / aspect;
  }
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
}
window.addEventListener('resize', resize);
resize();

// --- Bootstrap ---
document.getElementById('loading').style.display = 'none';
currentScene = scenes.title;
if (scenes.title.init) scenes.title.init();
lastTime = performance.now();
requestAnimationFrame(gameLoop);

</script>
