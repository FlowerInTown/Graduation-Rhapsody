# ============================================================
# 银河友人 (Star Drifter) - nginx 静态托管 (IP + 端口直访)
# ------------------------------------------------------------
# 访问方式: http://<服务器公网IP>:8083/
# 想换端口就改下面 listen 那一行
# ============================================================

server {
    listen 8083;
    listen [::]:8083;

    server_name _;

    root /var/www/Stellar-Friends;
    index game.html;

    client_max_body_size 2m;

    access_log /var/log/nginx/Stellar-Friends.access.log;
    error_log  /var/log/nginx/Stellar-Friends.error.log warn;

    # 访问根路径 -> 打开 game.html
    location = / {
        try_files /game.html =404;
    }

    # game.html: 不缓存, 改代码后立即生效
    location = /game.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # 静态资源: 长缓存 + range 请求 (音乐 seek/分段加载必须)
    location /assets/ {
        add_header Accept-Ranges bytes always;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files $uri =404;
    }

    # 兜底
    location / {
        try_files $uri $uri/ /game.html;
    }

    # 补充 MIME, 避免某些发行版的 mime.types 不全
    types {
        text/html                             html;
        text/plain                            txt;
        text/css                              css;
        application/javascript                js;
        application/json                      json;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/webp                            webp;
        image/svg+xml                         svg;
        image/x-icon                          ico;
        audio/mpeg                            mp3;
        audio/ogg                             ogg oga;
        audio/wav                             wav;
        font/woff                             woff;
        font/woff2                            woff2;
    }

    # 文本类压缩, 图片/音频已压过不要再 gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/html
        application/javascript
        application/json
        image/svg+xml;

    # 安全杂项
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # 隐藏文件防误传
    location ~ /\.(?!well-known) {
        deny all;
    }
}
